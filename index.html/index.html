<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Bullet Runner+</title>

<style>
body { margin:0; overflow:hidden; background:black; }

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

#menu {
  position:absolute;
  z-index:10;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-family:monospace;
}

#ui {
  position:absolute;
  z-index:10;
  color:white;
  font-family:monospace;
  left:10px;
  top:10px;
  display:none;
}

button {
  font-size:26px;
  padding:12px 40px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Pixel Bullet Runner</h1>
  <button id="playBtn">▶ PLAY</button>
</div>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<div id="ui">
Score:<span id="score">0</span>
LV:<span id="level">1</span>
HP:<span id="hp">10</span>
</div>

<script>

// ===== 起動 =====
let running=false;

document.getElementById("playBtn").addEventListener("click", ()=>{
  document.getElementById("menu").style.display="none";
  document.getElementById("ui").style.display="block";
  resetGame();
  running=true;
});

// ===== Canvas =====
const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

bg.width=canvas.width=innerWidth;
bg.height=canvas.height=innerHeight;

// ===== 入力 =====
let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

// ===== 状態 =====
let player,enemies,followers,heals,lasers,smallBullets,sakura;
let score,level,prevLevel,hp,invincible;
let spawnTimer,laserTimer,levelTimer;
let speedScale=1;

// ===== 初期化 =====
function resetGame(){
  player={x:100,y:canvas.height-40,vy:0,jump:0};

  enemies=[];
  followers=[];
  heals=[];
  lasers=[];
  smallBullets=[];
  sakura=[];

  score=0;
  level=1;
  prevLevel=1;
  hp=10;
  invincible=0;

  spawnTimer=0;
  laserTimer=0;
  levelTimer=0;

  updateUI();
}

// ===== UI =====
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const hpEl=document.getElementById("hp");

function updateUI(){
  scoreEl.textContent=score;
  levelEl.textContent=level;
  hpEl.textContent=hp;
}

// ===== 背景 =====
function drawBG(){
  if(level<10){
    bctx.fillStyle="#66cc66";
    bctx.fillRect(0,0,canvas.width,canvas.height);
    return;
  }

  bctx.fillStyle="#0b0f2a";
  bctx.fillRect(0,0,canvas.width,canvas.height);

  // 月
  bctx.fillStyle="#f5f3ce";
  bctx.beginPath();
  bctx.arc(canvas.width-120,120,30,0,Math.PI*2);
  bctx.fill();

  // 山
  bctx.fillStyle="#1a1a1a";
  bctx.beginPath();
  bctx.moveTo(canvas.width/2-200,canvas.height);
  bctx.lineTo(canvas.width/2,canvas.height-220);
  bctx.lineTo(canvas.width/2+200,canvas.height);
  bctx.fill();
}

// ===== 桜 =====
function spawnSakura(){
  if(level<10) return;
  if(Math.random()<0.25){
    sakura.push({
      x:Math.random()*canvas.width,
      y:-10,
      vx:Math.random()-0.5,
      vy:Math.random()*2+1,
      size:3+Math.random()*3
    });
  }
}

function drawSakura(){
  sakura.forEach((s,i)=>{
    s.x += s.vx * 0.5;
    s.y += s.vy * speedScale * 0.6;
    ctx.fillStyle="pink";
    ctx.fillRect(s.x,s.y,s.size,s.size);
    if(s.y>canvas.height) sakura.splice(i,1);
  });
}

// ===== プレイヤー =====
function drawPlayer(){
  ctx.fillStyle="#222";
  ctx.fillRect(player.x,player.y,32,32);

  ctx.fillStyle="white";
  ctx.fillRect(player.x+6,player.y+8,6,6);
  ctx.fillRect(player.x+20,player.y+8,6,6);
}

function maxJump(){
  return level>=70 ? 3 : 2;
}

// ===== 敵 =====
function spawnEnemies(){

  if(level>=60 && level<100) return;

  if(Math.random()<0.3){
    enemies.push({
      x:canvas.width,
      y:canvas.height-40,
      w:30,h:30,
      vx:-4 * speedScale
    });
  }

  if(level>=10){
    let max = level<20 ? 2 : 4;
    if(followers.length<max && Math.random()<0.12){
      followers.push({
        x:Math.random()*canvas.width,
        y:0,
        w:15,h:15
      });
    }
  }

  if(Math.random()<0.05){
    heals.push({
      x:canvas.width,
      y:canvas.height-80,
      w:15,h:15,
      vx:-3 * speedScale
    });
  }
}

// ===== 小弾 =====
function spawnSmallBullets(){
  if(level>=60 && level<100) return;

  let chance = level<20 ? 0.12 : 0.25;

  if(Math.random()<chance){
    smallBullets.push({
      x:canvas.width,
      y:canvas.height-70,
      w:8,h:8,
      vx:-5 * speedScale
    });
  }
}

// ===== レーザー =====
function spawnLaser(){
  if(level<50) return;

  let v=1;
  let h=0;

  if(level>=60) v=7;
  if(level>=70) h=2;

  for(let i=0;i<v;i++){
    lasers.push({type:"v",x:Math.random()*canvas.width,t:0});
  }

  for(let i=0;i<h;i++){
    lasers.push({
      type:"h",
      y:Math.random()*canvas.height,
      x:Math.random()<0.5?-20:canvas.width+20,
      dir:Math.random()<0.5?1:-1,
      t:0
    });
  }
}

// ===== 当たり =====
function hit(e){
  return player.x<e.x+e.w &&
         player.x+32>e.x &&
         player.y<e.y+e.h &&
         player.y+32>e.y;
}

// ===== ダメージ =====
function damage(){
  if(invincible<=0){
    hp--;
    invincible=40;
    updateUI();
    if(hp<=0){
      alert("Game Over "+score);
      location.reload();
    }
  }
}

// ===== メイン =====
function loop(){

  requestAnimationFrame(loop);
  if(!running) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBG();

  // スピードスケール
  speedScale = 1 + level * 0.05;
  if(speedScale > 3) speedScale = 3;

  // 横移動
  if(level>=5){
    if(keys["ArrowRight"]) player.x+=5;
    if(keys["ArrowLeft"]) player.x-=5;
  }

  // ジャンプ
  if(keys["Space"] && player.jump<maxJump()){
    player.vy=-12;
    player.jump++;
    keys["Space"]=false;
  }

  player.vy+=0.7;
  player.y+=player.vy;

  if(player.y>canvas.height-40){
    player.y=canvas.height-40;
    player.jump=0;
    player.vy=0;
  }

  drawPlayer();

  spawnSakura();
  drawSakura();

  spawnTimer++;
  if(spawnTimer > (60 / speedScale)){
    spawnEnemies();
    spawnSmallBullets();
    spawnTimer=0;
  }

  laserTimer++;
  if(laserTimer > (120 / speedScale)){
    spawnLaser();
    laserTimer=0;
  }

  enemies.forEach((e,i)=>{
    e.x+=e.vx;
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,e.w,e.h);
    if(hit(e)) damage();
    if(e.x<-50) enemies.splice(i,1);
  });

  followers.forEach((f,i)=>{
    let dx = player.x - f.x;
    f.x += Math.sign(dx)*(1+Math.random()*0.5)*speedScale;
    f.y += (1+Math.random()*0.3)*speedScale;

    ctx.fillStyle="orange";
    ctx.fillRect(f.x,f.y,f.w,f.h);

    if(hit(f)) damage();
    if(f.y>canvas.height) followers.splice(i,1);
  });

  heals.forEach((h,i)=>{
    h.x+=h.vx;
    ctx.fillStyle="lime";
    ctx.fillRect(h.x,h.y,h.w,h.h);
    if(hit(h)){
      hp=Math.min(10,hp+1);
      updateUI();
      heals.splice(i,1);
    }
  });

  smallBullets.forEach((b,i)=>{
    b.x+=b.vx;
    ctx.fillStyle="red";
    ctx.fillRect(b.x,b.y,b.w,b.h);
    if(hit(b)) damage();
    if(b.x<-20) smallBullets.splice(i,1);
  });

  lasers.forEach((l,i)=>{
    l.t+=3;

    if(l.type==="v"){
      if(l.t<40){
        ctx.fillStyle="white";
        ctx.fillRect(l.x,0,2,canvas.height);
      } else if(l.t<80){
        ctx.fillStyle="red";
        ctx.fillRect(l.x-12,0,24,canvas.height);
        if(player.x<l.x+12 && player.x+32>l.x-12) damage();
      } else lasers.splice(i,1);
    }

    if(l.type==="h"){
      l.x += l.dir * 5 * speedScale;

      if(l.t<40){
        ctx.fillStyle="white";
        ctx.fillRect(l.x,l.y,40,2);
      } else if(l.t<80){
        ctx.fillStyle="orange";
        ctx.fillRect(l.x,l.y,60,6);
        if(player.x<l.x+60 && player.x+32>l.x &&
           player.y<l.y+6 && player.y+32>l.y){
          damage();
        }
      } else lasers.splice(i,1);
    }
  });

  score++;
  prevLevel=level;
  level=Math.floor(score/300)+1;
  updateUI();

  if(level>prevLevel && level%5===0){
    levelTimer=60;
  }

  if(levelTimer>0){
    ctx.fillStyle="white";
    ctx.font="50px monospace";
    ctx.fillText("LEVEL "+level,canvas.width/2-120,canvas.height/2);
    levelTimer--;
  }

  if(invincible>0) invincible--;
}

loop();

</script>
</body>
</html>
